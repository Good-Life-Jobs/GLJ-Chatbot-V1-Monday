<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Life Jobs — Kwalificatiechat</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:12px}
  #app{width:100%;max-width:440px}

  /* Chat shell */
  .shell{display:flex;flex-direction:column;height:680px;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.1);overflow:hidden}

  /* Header */
  .hd{background:#fff;border-bottom:1px solid #e8eaed;padding:12px 16px;flex-shrink:0}
  .hd-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .hd-icon{width:32px;height:32px;border-radius:50%;background:#e8f0fe;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .hd-icon svg{width:15px;height:15px;color:#1a56db}
  .hd-title{font-weight:600;font-size:13px;color:#111;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hd-sub{font-size:10px;color:#888}
  .hd-pct{font-size:11px;color:#555;flex-shrink:0}
  .prog-bar{height:3px;background:#e8eaed;border-radius:2px;overflow:hidden}
  .prog-fill{height:100%;background:#1B4F72;border-radius:2px;transition:width .5s ease}

  /* Candidate bar */
  .cbar{background:#f8f9fa;border-bottom:1px solid #e8eaed;padding:7px 16px;flex-shrink:0;display:flex;align-items:center;gap:9px}
  .cbar-av{width:24px;height:24px;border-radius:50%;background:#1B4F72;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-weight:600;color:#fff}
  .cbar-info{font-size:11px;color:#666;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cbar-tag{font-size:10px;color:#aaa;flex-shrink:0}

  /* Messages */
  .msgs{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:8px}
  .msg-row{display:flex}
  .msg-row.user{justify-content:flex-end}
  .bubble{max-width:88%;padding:9px 13px;font-size:13px;line-height:1.55;white-space:pre-line}
  .bubble.bot{background:#fff;border:1px solid #e8eaed;border-radius:16px 16px 16px 4px;color:#111}
  .bubble.user{background:#1B4F72;color:#fff;border-radius:16px 16px 4px 16px}

  /* Typing dots */
  .typing{display:flex;gap:4px;align-items:center;padding:9px 13px}
  @keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
  .dot{width:6px;height:6px;border-radius:50%;background:#aaa;animation:bop 1.2s ease-in-out infinite}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}

  /* Suggest cards */
  .sug-wrap{display:flex;flex-direction:column;gap:8px;padding:0 2px}
  .sug-card{text-align:left;padding:12px 14px;border-radius:10px;border:1px solid #e0e0e0;background:#fff;cursor:pointer;width:100%;transition:border-color .15s,opacity .2s}
  .sug-card:hover{border-color:#1B4F72}
  .sug-card.selected{border-color:#1B4F72}
  .sug-card.dim{opacity:.4;cursor:default}
  .sug-title{font-weight:600;font-size:13px;color:#111}
  .sug-loc{font-size:11px;color:#666;margin-top:2px}
  .sug-cta{font-size:11px;margin-top:7px}
  .sug-cta.active{color:#1B4F72}
  .sug-cta.done{color:#1e7e34}

  /* Input area */
  .inp-area{flex-shrink:0;background:#fff;border-top:1px solid #e8eaed}
  .chips{padding:10px 12px;display:flex;flex-wrap:wrap;gap:7px}
  .chip{padding:7px 14px;border-radius:20px;border:1px solid #d0d5dd;background:#fff;color:#333;font-size:12px;cursor:pointer;font-family:inherit;transition:border-color .12s,background .12s}
  .chip:hover{border-color:#1B4F72;background:#f0f4ff}
  .chip:active{transform:scale(.97)}
  .txt-row{padding:10px 12px;display:flex;gap:8px;align-items:flex-end}
  .txt-row input,.txt-row textarea{flex:1;font-size:13px;font-family:inherit;border:1px solid #d0d5dd;border-radius:10px;padding:8px 11px;outline:none;resize:none;background:#fafafa;color:#111;line-height:1.45}
  .txt-row input:focus,.txt-row textarea:focus{border-color:#1B4F72;background:#fff}
  .send-btn{padding:0 14px;height:36px;border-radius:10px;background:#1B4F72;color:#fff;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;flex-shrink:0;white-space:nowrap}
  .send-btn:hover{background:#154060}

  /* Salary slider */
  .sal-wrap{padding:13px 16px}
  .sal-row{margin-bottom:9px}
  .sal-lbl{display:flex;justify-content:space-between;font-size:11px;color:#666;margin-bottom:4px}
  .sal-lbl strong{color:#111;font-weight:600}
  input[type=range]{width:100%;margin:0;accent-color:#1B4F72;cursor:pointer}
  .sal-confirm{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
  .sal-disp{font-size:13px;font-weight:600;color:#111}
  .sal-ok{padding:7px 18px;border-radius:10px;background:#1B4F72;color:#fff;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit}
  .sal-ok:hover{background:#154060}

  /* Done bar */
  .done-bar{padding:12px 16px;text-align:center;font-size:12px;color:#666;display:flex;align-items:center;justify-content:center;gap:6px}
  .done-bar svg{width:14px;height:14px;color:#1e7e34;flex-shrink:0}

  /* Select screen */
  .select-screen{padding:2rem 1.25rem}
  .sel-header{text-align:center;margin-bottom:1.5rem}
  .sel-badge{font-size:10px;font-weight:600;color:#888;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
  .sel-title{font-size:15px;font-weight:600;color:#111;margin-bottom:4px}
  .sel-sub{font-size:12px;color:#888}
  .vac-cards{display:flex;flex-direction:column;gap:10px}
  .vac-card{text-align:left;padding:14px 16px;background:#fff;border:1px solid #e0e0e0;border-radius:12px;cursor:pointer;width:100%;transition:border-color .12s,box-shadow .12s}
  .vac-card:hover{border-color:#1B4F72;box-shadow:0 2px 8px rgba(27,79,114,.12)}
  .vac-name{font-weight:600;font-size:14px;color:#111}
  .vac-loc{font-size:12px;color:#666;margin-top:3px}
  .sel-note{text-align:center;margin-top:14px;font-size:11px;color:#aaa}
  code{font-size:11px;background:#f0f2f5;padding:1px 5px;border-radius:4px}

  @keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  .nm{animation:fadein .2s ease}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const WEBHOOK = "https://hook.eu1.make.com/7enxwkzposiksv7dzvq4ll1eu9legi3u";
const WA_NUMBER = "31657900347"; // WhatsApp number for CV

// ─── VACANCY CONFIGS ──────────────────────────────────────────────────────────
const VACANCIES = {
  "elektromonteur-amsterdam": {
    title: "Elektromonteur",
    loc: "Amsterdam",
    extra: [
      { id:"hoogspanning", text:"Heb je ervaring met hoogspanningsinstallaties (>1kV)?", type:"choice",
        opts:["Ja, ruime ervaring","Beperkte ervaring","Nee, alleen laagspanning"] },
      { id:"nen3140", text:"Heb je een NEN 3140 certificaat?", type:"choice",
        opts:["Ja, VP","Ja, VOP","Nee, maar wil dit halen","Nee"] }
    ]
  },
  "servicemonteur-hvac-rotterdam": {
    title: "Service Monteur HVAC",
    loc: "Rotterdam",
    extra: [
      { id:"fgassen", text:"Ben je gecertificeerd voor werken met koudemiddelen (F-gassen)?", type:"choice",
        opts:["Ja, categorie I","Ja, categorie II","Nee"] },
      { id:"storingsdienst", text:"Ben je bereid storingsdiensten te draaien, ook buiten kantooruren?", type:"choice",
        opts:["Ja, prima","Incidenteel is oké","Nee, liever niet"] }
    ]
  },
  "allround-monteur-werktuigbouw-utrecht": {
    title: "Allround Monteur Werktuigbouw",
    loc: "Utrecht",
    extra: [
      { id:"cnc", text:"Heb je ervaring met CNC-machines of bewerkingscentra?", type:"choice",
        opts:["Ja, dagelijks","Ja, regelmatig","Beperkt","Nee"] },
      { id:"ploegen_vac", text:"Sta je open voor ploegendienst binnen deze functie?", type:"choice",
        opts:["Ja, geen probleem","2-ploegen wel, meer liever niet","Liever niet","Nee"] }
    ]
  }
};

// ─── GENERIC QUESTIONS ────────────────────────────────────────────────────────
// Personal info (name/phone/email/city) comes from Perspective via URL params — not asked here
const GQ = [
  { id:"exp", text:"Hoeveel jaar werkervaring heb je als technicus?", type:"choice",
    opts:["Minder dan 1 jaar","1–3 jaar","3–5 jaar","5–10 jaar","Meer dan 10 jaar"] },
  { id:"spec", text:"Wat is je voornaamste technische specialisatie?", type:"choice",
    opts:["Elektrotechniek","Werktuigbouw / mechanica","HVAC / klimaat","Installatietechniek","Mechatronica","Anders"] },
  { id:"opl", text:"Wat is je hoogst afgeronde opleiding?", type:"choice",
    opts:["VMBO","MBO niveau 2","MBO niveau 3","MBO niveau 4","HBO","Anders / geen diploma"] },
  { id:"vca", text:"Ben je in het bezit van een VCA-certificaat?", type:"choice",
    opts:["Ja, VCA*","Ja, VCA**","Nee, maar kan ik halen","Nee"] },
  { id:"rij", text:"Welk rijbewijs heb je?", type:"choice",
    opts:["Rijbewijs B","Rijbewijs B + BE","Rijbewijs C/CE","Geen rijbewijs"] },
  { id:"besch", text:"Wanneer kun je starten?", type:"choice",
    opts:["Direct beschikbaar","Binnen 1 maand","Binnen 3 maanden","Later"] },
  { id:"reis", text:"Hoe ver ben je bereid te reizen voor je werk?", type:"choice",
    opts:["Max. 30 km","Max. 50 km","Max. 75 km","Heel Nederland"] },
  { id:"sal", text:"Wat is je gewenste bruto maandsalaris per maand?", type:"salary" },
  { id:"dienst", text:"Heb je een voorkeur voor binnendienst of buitendienst?", type:"choice",
    opts:["Binnendienst","Buitendienst","Geen voorkeur / combinatie"] },
  // ploegendienst inserted conditionally after dienst (only when not Buitendienst)
  { id:"intl", text:"Sta je open voor internationaal werk?", type:"choice",
    opts:["Ja, graag","Incidenteel is oké","Nee"] },
  { id:"uren", text:"Hoeveel uur per week wil je werken?", type:"choice",
    opts:["32 uur","36 uur","40 uur","Meer dan 40 uur","Geen voorkeur"] }
];

const PLOEG_Q = {
  id:"ploeg", text:"Sta je open voor werken in ploegendienst?", type:"choice",
  opts:["Geen ploegendienst","2-ploegen","3-ploegen","4-ploegen","5-ploegen","Alle ploegen goed"]
};

// ─── STATE ────────────────────────────────────────────────────────────────────
// In production, cand + mondayId come from URL params:
// ?vacancy=elektromonteur-amsterdam&name=Jan&phone=06..&email=jan@..&city=Amsterdam&mondayId=123456
function readUrlParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    vacancyKey: p.get("vacancy") || null,
    candidate: {
      name:  p.get("name")  || "Jan de Vries",
      phone: p.get("phone") || "06 12345678",
      email: p.get("email") || "jan@example.com",
      city:  p.get("city")  || "Amsterdam"
    },
    mondayId: p.get("mondayId") || "demo_12345"
  };
}

const params = readUrlParams();

let S = {
  cand:     params.candidate,
  mondayId: params.mondayId,
  vk:       params.vacancyKey,
  sid:      uid(),

  phase:     params.vacancyKey ? "generic" : "select",
  gIdx:      0,
  plgPend:   false,

  cvStep: "upl",        // upl | hv
  weStep: null,         // co | ro | pr | more
  wExps:  [],
  curWE:  {},

  vqIdx:    0,
  retVk:    null,
  retVqIdx: 0,
  isRet:    false,

  ans:    {},
  salMin: 2750,
  salMax: 3500,
  msgs:   [],
  typing: false,
  done:   false
};

// ─── UTILITIES ────────────────────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2,9) + Date.now().toString(36); }

function fmtSal(v) { return "€\u202f" + v.toLocaleString("nl-NL"); }

function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ─── WEBHOOK + NOTE ───────────────────────────────────────────────────────────
function sendHook(data) {
  const note = buildNote();
  const payload = {
    ...data,
    session_id:    S.sid,
    monday_item_id: S.mondayId,   // Make.com uses this to UPDATE the existing candidate item
    candidate:     S.cand,
    vacancy_id:    S.vk,
    vacancy_title: S.vk ? VACANCIES[S.vk].title : "",
    monday_note:   note,          // Make.com writes this directly to the Gesprek column
    ts:            new Date().toISOString()
  };
  console.log("%cWebhook payload", "color:#1B4F72;font-weight:bold", "\n" + JSON.stringify(payload, null, 2));
  if (!WEBHOOK) return;
  fetch(WEBHOOK, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  }).catch(() => {});
}

// Builds a compact note for the Monday "Gesprek" column (target: under 1500 chars)
function buildNote() {
  const a = S.ans;
  const f = (k, lbl) => a[k] ? `${lbl}:${a[k]}` : null;
  const row = (...items) => items.filter(Boolean).join(" | ");

  const lines = [];

  const r1 = row(f("exp","Exp"), f("spec","Spec"), f("opl","Opl"));
  const r2 = row(f("vca","VCA"), f("rij","Rij"), f("besch","Besch"));
  const r3 = row(f("reis","Reis"), f("sal","Sal"));
  const r4 = row(f("dienst","Dienst"), f("ploeg","Ploeg"), f("intl","Intl"), f("uren","Uren"));
  [r1, r2, r3, r4].forEach(r => { if (r) lines.push(r); });

  // CV / work experience
  if (S.wExps.length > 0) {
    lines.push("");
    lines.push("Werkervaring:");
    S.wExps.forEach((w, i) => {
      // Truncate long role descriptions to keep note compact
      const ro = w.ro.length > 80 ? w.ro.slice(0, 77) + "..." : w.ro;
      lines.push(`${i+1}. ${w.co} / ${ro} / ${w.pr}`);
    });
  } else if (a.cv_upl) {
    const cvLine = a.cv_upl === "Ja, al gedaan"   ? "CV: Geüpload in Perspective"
                 : a.cv_hv  === "Ja, ik heb een CV" ? "CV: Via WhatsApp gestuurd"
                 : a.cv_hv                           ? "CV: Geen CV beschikbaar"
                 : "";
    if (cvLine) lines.push(cvLine);
  }

  // Primary vacancy-specific answers
  if (S.vk) {
    const v = VACANCIES[S.vk];
    lines.push("");
    lines.push(`[${v.title} – ${v.loc}]`);
    v.extra.forEach(q => { if (a[q.id]) lines.push(`${q.id}: ${a[q.id]}`); });
  }

  // Cross-vacancy answers
  if (S.retVk) {
    const rv = VACANCIES[S.retVk];
    lines.push("");
    lines.push(`[${rv.title} – ${rv.loc}]`);
    rv.extra.forEach(q => { if (a["r_" + q.id]) lines.push(`${q.id}: ${a["r_" + q.id]}`); });
  }

  lines.push("\u2713 " + new Date().toLocaleDateString("nl-NL",{day:"2-digit",month:"2-digit"}) +
             " " + new Date().toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"}));

  return lines.join("\n");
}

// ─── QUESTION ROUTER ──────────────────────────────────────────────────────────
function getQ() {
  const s = S;
  if (s.phase === "generic") {
    if (s.plgPend) return PLOEG_Q;
    return GQ[s.gIdx] || null;
  }
  if (s.phase === "cv") {
    if (s.cvStep === "upl") return { id:"cv_upl", type:"choice", opts:["Ja, al gedaan","Nee"] };
    if (s.cvStep === "hv")  return { id:"cv_hv",  type:"choice", opts:["Ja, ik heb een CV","Nee, ik heb geen CV"] };
    return null;
  }
  if (s.phase === "work_experience") {
    if (s.weStep === "co")   return { id:"we_co",   type:"text", ph:"Naam van het bedrijf" };
    if (s.weStep === "ro")   return { id:"we_ro",   type:"textarea", ph:"Bijv: elektromonteur, werkte aan panelenbouw, bekabeling, storingen, MV-schakelkasten..." };
    if (s.weStep === "pr")   return { id:"we_pr",   type:"text", ph:"Bijv: 2019 – heden" };
    if (s.weStep === "more") return { id:"we_more", type:"choice", opts:["Ja, nog een toevoegen","Nee, dat is alles"] };
    return null;
  }
  if (s.phase === "vacancy_specific") return VACANCIES[s.vk]?.extra[s.vqIdx] || null;
  if (s.phase === "return_specific")  return VACANCIES[s.retVk]?.extra[s.retVqIdx] || null;
  return null;
}

// ─── CHAT LOGIC ───────────────────────────────────────────────────────────────
function addMsg(sender, text, extra) {
  S.msgs.push({ id: uid(), sender, text, ...(extra || {}) });
}

function bot(text, cb, delay) {
  S.typing = true; render();
  setTimeout(() => {
    S.typing = false;
    addMsg("bot", text);
    if (cb) cb(); else render();
  }, delay || (700 + Math.random() * 350));
}

function handleAnswer(answer) {
  const q = getQ();
  if (!q) return;

  addMsg("user", answer);
  const key = S.phase === "return_specific" ? "r_" + q.id : q.id;
  S.ans[key] = answer;

  sendHook({ status:"in_progress", last_q:q.id, last_a:answer, answers:{...S.ans}, work_exp:S.wExps });

  if      (S.phase === "generic")           handleGeneric(q, answer);
  else if (S.phase === "cv")                handleCV(q, answer);
  else if (S.phase === "work_experience")   handleWE(q, answer);
  else if (S.phase === "vacancy_specific")  handleVS();
  else if (S.phase === "return_specific")   handleReturn();
}

function handleGeneric(q, answer) {
  // Conditional ploegendienst: insert after dienst if not Buitendienst
  if (q.id === "dienst" && answer !== "Buitendienst") {
    S.plgPend = true;
    bot(PLOEG_Q.text, render);
    return;
  }
  if (q.id === "ploeg") {
    S.plgPend = false;
    S.gIdx++; // advance past dienst to internationaal
    bot(GQ[S.gIdx].text, render);
    return;
  }
  if (S.gIdx + 1 < GQ.length) {
    S.gIdx++;
    bot(GQ[S.gIdx].text, render);
  } else {
    startCVPhase();
  }
}

function startCVPhase() {
  S.phase = "cv"; S.cvStep = "upl";
  bot("Heb je al je CV geüpload in Perspective?", render);
}

function handleCV(q, answer) {
  if (q.id === "cv_upl") {
    if (answer === "Ja, al gedaan") {
      bot("Top! Dan hebben we je CV al ontvangen.", () => startVacancySpecific());
    } else {
      S.cvStep = "hv";
      bot("Geen probleem. Heb je een CV die je kunt sturen?", render);
    }
  } else if (q.id === "cv_hv") {
    if (answer === "Ja, ik heb een CV") {
      bot(`Stuur je CV via WhatsApp naar +${WA_NUMBER}.\n\nWe kijken ernaar en nemen zo snel mogelijk contact op.`, () => {
        bot("Ondertussen stel ik je de vacature-specifieke vragen.", () => startVacancySpecific(), 700);
      });
    } else {
      bot("Geen probleem! Dan stel ik je een paar vragen over je werkervaring. Zo weten we precies wat je hebt gedaan en kunt.\n\nBij welk bedrijf heb je het meest recentelijk gewerkt?", () => {
        S.phase = "work_experience"; S.weStep = "co";
        S.wExps = []; S.curWE = {};
        render();
      });
    }
  }
}

function handleWE(q, answer) {
  if (S.weStep === "co") {
    S.curWE.co = answer; S.weStep = "ro";
    bot("Wat was je functietitel en wat deed je er precies?\n\nWees zo specifiek mogelijk: type installaties of machines, soort werkzaamheden, materialen, projecten. Hoe meer detail, hoe beter.", render);
  } else if (S.weStep === "ro") {
    S.curWE.ro = answer; S.weStep = "pr";
    bot("Van wanneer tot wanneer heb je daar gewerkt?", render);
  } else if (S.weStep === "pr") {
    S.curWE.pr = answer;
    S.wExps.push({ ...S.curWE }); S.curWE = {};
    S.weStep = "more";
    bot(`Werkervaring ${S.wExps.length} opgeslagen ✓\n\nWil je nog een werkervaring toevoegen?`, render);
  } else if (S.weStep === "more") {
    if (answer.startsWith("Ja")) {
      S.weStep = "co";
      bot("Bij welk bedrijf heb je daarvoor gewerkt?", render);
    } else {
      bot("Bedankt! Dat geeft een goed beeld van je achtergrond.", () => startVacancySpecific());
    }
  }
}

function startVacancySpecific() {
  const v = VACANCIES[S.vk];
  S.phase = "vacancy_specific"; S.vqIdx = 0;
  bot(`Dan heb ik nog ${v.extra.length} vragen specifiek voor de functie ${v.title}.`, () => {
    bot(v.extra[0].text, render, 500);
  });
}

function handleVS() {
  const v = VACANCIES[S.vk];
  if (S.vqIdx + 1 < v.extra.length) {
    S.vqIdx++;
    bot(v.extra[S.vqIdx].text, render);
  } else {
    finishChat();
  }
}

function finishChat() {
  S.done = true; S.phase = "done";
  sendHook({ status:"completed", answers:{...S.ans}, work_exp:S.wExps });

  const fn = S.cand.name.split(" ")[0];
  bot(`Bedankt, ${fn}! Je gegevens zijn ontvangen.\n\nEen recruiter neemt zo snel mogelijk contact op via ${S.cand.phone}.`, () => {
    const others = Object.entries(VACANCIES).filter(([k]) => k !== S.vk);
    if (others.length) {
      setTimeout(() => {
        addMsg("bot", "Ben je ook geïnteresseerd in een van deze functies?\n\nJe algemene antwoorden slaan we op — je hoeft alleen de vacature-specifieke vragen te beantwoorden.");
        addMsg("suggest", "", { vacs: others });
        render();
      }, 900);
    } else {
      render();
    }
  });
}

function startReturn(k) {
  if (S.isRet) return;
  S.retVk = k; S.isRet = true;
  S.done = false;
  S.phase = "return_specific"; S.retVqIdx = 0;
  const v = VACANCIES[k];
  addMsg("user", "Interesse in " + v.title);
  bot(`Top! Dan stel ik je de vragen voor ${v.title} in ${v.loc}.\n\n${v.extra[0].text}`, render, 800);
}

function handleReturn() {
  const rv = VACANCIES[S.retVk];
  if (S.retVqIdx + 1 < rv.extra.length) {
    S.retVqIdx++;
    bot(rv.extra[S.retVqIdx].text, render);
  } else {
    sendHook({ status:"completed_additional", additional_vacancy:S.retVk, answers:{...S.ans} });
    bot(`Goed! We kijken ook of je geschikt bent voor ${rv.title} in ${rv.loc}. De recruiter neemt dit mee.`, () => {
      S.done = true; S.phase = "done";
      render();
    });
  }
}

// ─── RENDERING ────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  if (!app) return;
  if (S.phase === "select") { renderSelect(app); return; }
  renderChat(app);
}

function renderSelect(app) {
  app.innerHTML = `
    <div class="select-screen">
      <div class="sel-header">
        <div class="sel-badge">Good Life Jobs — demo</div>
        <div class="sel-title">Kies een vacature om te testen</div>
        <div class="sel-sub">In productie: vacature via <code>?vacancy=</code> URL-parameter</div>
      </div>
      <div class="vac-cards">
        ${Object.entries(VACANCIES).map(([k,v]) => `
          <button class="vac-card" data-k="${k}">
            <div class="vac-name">${v.title}</div>
            <div class="vac-loc">📍 ${v.loc}</div>
          </button>
        `).join("")}
      </div>
      <p class="sel-note">Open de console (F12) om webhook payloads te zien</p>
    </div>`;
  app.querySelectorAll(".vac-card").forEach(b => b.onclick = () => {
    S.vk = b.dataset.k;
    S.phase = "generic"; S.gIdx = 0;
    const v = VACANCIES[S.vk];
    render();
    setTimeout(() => {
      bot(`Welkom bij de sollicitatie voor ${v.title} in ${v.loc}!\n\nJe gegevens zijn ontvangen via Perspective. Ik stel je nu een paar aanvullende vragen.\n\n${GQ[0].text}`, render, 600);
    }, 100);
  });
}

function renderChat(app) {
  const v = S.vk ? VACANCIES[S.vk] : null;

  // Progress estimate
  const vqTotal = S.vk ? VACANCIES[S.vk].extra.length : 0;
  const baseTotal = GQ.length + 1 + 1 + Math.max(S.wExps.length * 3, 0) + vqTotal;
  const answered  = Object.keys(S.ans).length + S.wExps.length * 3;
  const pct = (S.done && S.phase === "done") ? 100
            : Math.min(Math.round((answered / Math.max(baseTotal, 14)) * 100), 94);

  const ini = S.cand.name.split(" ").filter(Boolean).map(w => w[0]).slice(0,2).join("").toUpperCase();

  app.innerHTML = `
    <div class="shell">
      <div class="hd">
        <div class="hd-row">
          <div class="hd-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
          </div>
          <div style="flex:1;min-width:0">
            <div class="hd-title">${v ? v.title + " · " + v.loc : ""}</div>
            <div class="hd-sub">Good Life Jobs</div>
          </div>
          <div class="hd-pct">${pct}%</div>
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>

      <div class="cbar">
        <div class="cbar-av">${ini}</div>
        <div class="cbar-info">${esc(S.cand.name)} · ${esc(S.cand.phone)} · ${esc(S.cand.city)}</div>
        <div class="cbar-tag">via Perspective</div>
      </div>

      <div class="msgs" id="msgs">
        ${S.msgs.map(m => renderMsg(m)).join("")}
        ${S.typing ? `
          <div class="msg-row nm">
            <div class="bubble bot typing">
              <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
          </div>` : ""}
        <div id="btm"></div>
      </div>

      <div class="inp-area">${renderInput()}</div>
    </div>`;

  setTimeout(() => document.getElementById("btm")?.scrollIntoView({ behavior:"smooth" }), 30);
  bindEvents();
}

function renderMsg(m) {
  if (m.sender === "suggest") {
    return `<div class="sug-wrap nm">${m.vacs.map(([k, v2]) => {
      const sel = S.isRet && S.retVk === k;
      const dim = S.isRet && S.retVk !== k;
      return `<button class="sug-card ${sel?"selected":""} ${dim?"dim":""}" data-k="${k}">
        <div class="sug-title">${v2.title}</div>
        <div class="sug-loc">📍 ${v2.loc}</div>
        <div class="sug-cta ${sel?"done":"active"}">${sel ? "✓ Interesse toegevoegd" : "Toon ook interesse →"}</div>
      </button>`;
    }).join("")}</div>`;
  }
  return `<div class="msg-row ${m.sender} nm">
    <div class="bubble ${m.sender}">${esc(m.text)}</div>
  </div>`;
}

function renderInput() {
  const isDone = S.done && (S.phase === "done");
  if (S.typing || isDone) {
    return isDone ? `<div class="done-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Gesprek voltooid · gegevens ontvangen
    </div>` : "";
  }

  const q = getQ();
  if (!q) return "";

  if (q.type === "choice") {
    return `<div class="chips">${(q.opts || []).map(o =>
      `<button class="chip" data-o="${esc(o)}">${esc(o)}</button>`
    ).join("")}</div>`;
  }

  if (q.type === "salary") {
    const mx = Math.max(S.salMax, S.salMin + 250);
    return `<div class="sal-wrap">
      <div class="sal-row">
        <div class="sal-lbl"><span>Minimum</span><strong id="lbl-mn">${fmtSal(S.salMin)}</strong></div>
        <input type="range" id="sal-mn" min="2000" max="6000" step="250" value="${S.salMin}">
      </div>
      <div class="sal-row">
        <div class="sal-lbl"><span>Maximum</span><strong id="lbl-mx">${fmtSal(mx)}</strong></div>
        <input type="range" id="sal-mx" min="${S.salMin + 250}" max="6500" step="250" value="${mx}">
      </div>
      <div class="sal-confirm">
        <div class="sal-disp" id="sal-disp">${fmtSal(S.salMin)} – ${fmtSal(mx)}</div>
        <button class="sal-ok">Dit klopt</button>
      </div>
    </div>`;
  }

  const isTA = q.type === "textarea";
  return `<div class="txt-row">
    ${isTA
      ? `<textarea id="ti" placeholder="${esc(q.ph || "Typ hier...")}" rows="2"></textarea>`
      : `<input type="text" id="ti" placeholder="${esc(q.ph || "Typ hier...")}">`
    }
    <button class="send-btn" id="sb">Stuur</button>
  </div>`;
}

// ─── EVENT BINDING ────────────────────────────────────────────────────────────
function bindEvents() {
  const app = document.getElementById("app");
  if (!app) return;

  // Chip buttons
  app.querySelectorAll(".chip").forEach(b => b.onclick = () => handleAnswer(b.dataset.o));

  // Suggest cards
  app.querySelectorAll(".sug-card").forEach(b => b.onclick = () => startReturn(b.dataset.k));

  // Text / textarea send
  const ti = document.getElementById("ti");
  const sb = document.getElementById("sb");
  if (ti) {
    setTimeout(() => { try { ti.focus(); } catch(e) {} }, 80);
    const send = () => { const v = ti.value.trim(); if (v) handleAnswer(v); };
    if (ti.tagName === "INPUT") {
      ti.onkeydown = e => { if (e.key === "Enter") send(); };
    } else {
      ti.onkeydown = e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } };
    }
    if (sb) sb.onclick = send;
  }

  // Salary slider
  const mn  = document.getElementById("sal-mn");
  const mx  = document.getElementById("sal-mx");
  const lmn = document.getElementById("lbl-mn");
  const lmx = document.getElementById("lbl-mx");
  const dsp = document.getElementById("sal-disp");
  const ok  = document.querySelector(".sal-ok");

  function updateSal() {
    if (lmn) lmn.textContent = fmtSal(S.salMin);
    if (lmx) lmx.textContent = fmtSal(S.salMax);
    if (dsp) dsp.textContent = fmtSal(S.salMin) + " \u2013 " + fmtSal(S.salMax);
    if (mx)  { mx.min = S.salMin + 250; mx.value = S.salMax; }
  }

  if (mn) mn.oninput = () => {
    S.salMin = +mn.value;
    if (S.salMax <= S.salMin) S.salMax = S.salMin + 250;
    updateSal();
  };
  if (mx) mx.oninput = () => { S.salMax = +mx.value; updateSal(); };
  if (ok) ok.onclick = () => handleAnswer(fmtSal(S.salMin) + " \u2013 " + fmtSal(S.salMax) + " per maand");
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();

// If vacancy was passed via URL, start immediately
if (S.vk && S.phase === "generic") {
  const v = VACANCIES[S.vk];
  if (v) {
    setTimeout(() => {
      bot(`Welkom bij de sollicitatie voor ${v.title} in ${v.loc}!\n\nJe gegevens zijn ontvangen via Perspective. Ik stel je nu een paar aanvullende vragen.\n\n${GQ[0].text}`, render, 600);
    }, 200);
  } else {
    S.phase = "select"; render(); // unknown vacancy key → fallback to select
  }
}
</script>
</body>
</html>
